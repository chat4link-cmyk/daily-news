name: 每日新闻抓取 & 部署

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00 = 北京时间 08:00
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4

      - name: Fetch news
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          SITE_URL: "https://chat4link-cmyk.github.io/daily-news/"
        run: python fetch_news.py

      - name: Copy index to root (for GitHub Pages)
        run: cp web/index.html index.html

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ web/ index.html
          git diff --cached --quiet || git commit -m "📰 每日要闻 $(date +'%Y-%m-%d')"
          git push
